<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>
    <img id="floor_1" src="images/1.jpg" hidden>
    <img id="floor_2" src="images/2.jpg" hidden>
    <img id="floor_3" src="images/3.jpg" hidden>
    <img id="floor_4" src="images/4.jpg" hidden>

    <canvas id="canvas" width="500" height="500"></canvas>

    <button id="button_1"
            style="visibility: hidden;"
            value="1"
            onclick="functions.handleClick(this)">
        goto 1
    </button>
    <button id="button_2"
            style="visibility: hidden;"
            value="2"
            onclick="functions.handleClick(this)">
        goto 2
    </button>
    <button id="button_3"
            style="visibility: hidden;"
            value="3"
            onclick="functions.handleClick(this)">
        goto 3
    </button>
    <button id="button_4"
            style="visibility: hidden;"
            value="4"
            onclick="functions.handleClick(this)">
        goto 4
    </button>

    <p id="output"></p> <!-- print(data) if button ever been clicked -->

    <script type="module" src="main.js"></script>
</body>


</html>
